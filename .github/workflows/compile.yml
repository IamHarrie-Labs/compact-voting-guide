name: Compile Compact Contracts

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Compact toolchain manager
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.compact/bin" >> $GITHUB_PATH

      - name: Download latest compiler version
        run: |
          export PATH="$HOME/.compact/bin:$PATH"
          compact update
          compact --version
          compact compile --version || true

      - name: Compile voting.compact
        run: |
          mkdir -p out/voting
          compact compile voting.compact out/voting
          echo "✅ voting.compact compiled successfully"

      - name: Upload compilation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-contracts
          path: out/
